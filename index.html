<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | Secure Node</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* FIREWALL: Disable Text Selection */
        body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; background-color: #000; color: #fff; }
        .aura-gradient { background: linear-gradient(135deg, #007BFF, #6200EE, #FF4B5C); }
        .hidden { display: none !important; }
        #sentinel-firewall { transition: all 0.5s ease; }
    </style>
</head>
<body oncontextmenu="return false;"> <nav class="fixed top-0 w-full p-4 flex justify-between items-center z-50 bg-black/90 backdrop-blur-md border-b border-white/5">
        <div class="flex flex-col">
            <span class="text-xl font-black aura-gradient bg-clip-text text-transparent" style="-webkit-background-clip: text;">AURA</span>
            <span class="text-[9px] text-gray-500 font-bold uppercase tracking-widest flex items-center gap-1">
                <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span> Network: Encrypted Node
            </span>
        </div>
        <div class="flex gap-4">
            <i data-lucide="shield-check" class="text-green-500 w-5"></i>
            <i data-lucide="menu" class="text-gray-400 w-5"></i>
        </div>
    </nav>

    <main class="pt-24 px-6 text-center">
        <div class="glass-card p-10 rounded-3xl border border-white/10 bg-white/5">
            <div class="w-20 h-20 mx-auto bg-black rounded-2xl border border-purple-500/50 flex items-center justify-center mb-6">
                <i data-lucide="fingerprint" class="w-10 text-purple-500"></i>
            </div>
            <h2 class="text-2xl font-black italic">FOUNDER ZERO</h2>
            <p class="text-xs text-gray-500 mt-2 uppercase tracking-widest">Status: Ghost Protocol Active</p>
            
            <div class="mt-10 grid grid-cols-2 gap-4">
                <div class="p-4 bg-black/40 rounded-xl border border-white/5">
                    <p class="text-[10px] text-gray-500 font-bold">SENTINEL UPTIME</p>
                    <p class="text-lg font-black">99.9%</p>
                </div>
                <div class="p-4 bg-black/40 rounded-xl border border-white/5">
                    <p class="text-[10px] text-gray-500 font-bold">FIREWALL</p>
                    <p class="text-lg font-black text-green-500">ACTIVE</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="fixed bottom-0 w-full h-20 bg-black border-t border-white/5 flex justify-around items-center px-4">
        <i data-lucide="zap" class="text-purple-500"></i>
        <i data-lucide="search" class="text-gray-500"></i>
        <div class="w-12 h-12 aura-gradient rounded-full flex items-center justify-center shadow-lg"><i data-lucide="plus"></i></div>
        <i data-lucide="layers" class="text-gray-500"></i>
        <i data-lucide="shield" class="text-gray-500"></i>
    </footer>

    <script>
        lucide.createIcons();

        // FIREWALL: Key Blockers
        document.onkeydown = function(e) {
            // Block F12, Ctrl+Shift+I, Ctrl+U (Common hacker shortcuts)
            if(event.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73) || (e.ctrlKey && e.keyCode == 85)) {
                alert("Sentinel Firewall: Unauthorized access blocked.");
                return false;
            }
        };

        // Automatic Node Detection (Masking the user's IP)
        console.log("Aura Sentinel: Location masking engaged. Routing through global nodes...");
    </script>
</body>
</html>
